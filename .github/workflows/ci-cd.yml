# =============================================================================
# EcomOps CI/CD Pipeline
# =============================================================================
# Triggers: Push to main, Pull Requests to main
# Stages: Lint -> Test -> Build -> Push -> Deploy
# =============================================================================

name: EcomOps CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'product-service/**'
      - 'cart-service/**'
      - 'frontend/**'
      - 'k8s/**'
      - 'monitoring/**'
      - 'tests/**'
      - 'docker-compose.yml'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - develop

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

jobs:
  # ==========================================================================
  # STAGE 1: Lint
  # Run Python linting on all services
  # Fail the pipeline immediately if linting fails (fail-fast)
  # ==========================================================================
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, cart-service, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint

      - name: Run flake8 linting (${{ matrix.service }})
        run: |
          echo "Linting ${{ matrix.service }}..."
          if [ -d "${{ matrix.service }}" ]; then
            flake8 ${{ matrix.service }} --count --select=E9,F63,F7,F82 --show-source --statistics
            flake8 ${{ matrix.service }} --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
          else
            echo "Directory ${{ matrix.service }} not found, skipping lint."
          fi
        continue-on-error: false

      - name: Run pylint (${{ matrix.service }})
        run: |
          if [ -d "${{ matrix.service }}" ] && [ -f "${{ matrix.service }}/app.py" ]; then
            pylint ${{ matrix.service }}/app.py --disable=R,C --fail-under=7.0 || true
          else
            echo "Skipping pylint for ${{ matrix.service }}."
          fi
        continue-on-error: true

  # ==========================================================================
  # STAGE 2: Unit Tests
  # Run pytest for all services
  # Pipeline STOPS here if any test fails (test gating)
  # ==========================================================================
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    services:
      mongodb:
        image: mongo:7.0-jammy
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password123
          MONGO_INITDB_DATABASE: ecomops
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flask pymongo prometheus-flask-exporter requests

      - name: Run unit tests with coverage
        run: |
          export MONGO_HOST=localhost
          export MONGO_PORT=27017
          export MONGO_DB_NAME=ecomops
          export MONGO_USERNAME=admin
          export MONGO_PASSWORD=password123
          export FLASK_ENV=testing
          
          if [ -d "tests" ]; then
            pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --tb=short
          else
            echo "No tests/ directory found. Running inline tests..."
            pytest -v --tb=short || echo "No tests to run."
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  # ==========================================================================
  # STAGE 3: Build Docker Images
  # Build images for all 3 microservices
  # Tag with both 'latest' and commit SHA
  # ==========================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && needs.test.result == 'success'
    strategy:
      matrix:
        service: [product-service, cart-service, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,suffix=,format=short

      - name: Build Docker image (${{ matrix.service }})
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test Docker image (${{ matrix.service }})
        run: |
          echo "Built image: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}"
          docker images ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }} --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  # ==========================================================================
  # STAGE 4: Push Docker Images
  # Push both tags (latest + SHA) to Docker Hub
  # Only runs on main branch after successful build
  # ==========================================================================
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.result == 'success'
    strategy:
      matrix:
        service: [product-service, cart-service, frontend]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker images (${{ matrix.service }})
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed images
        run: |
          echo "Successfully pushed:"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}"

  # ==========================================================================
  # STAGE 5: Deploy to Kubernetes
  # Apply all K8s manifests to the cluster
  # Uses kubeconfig stored in GitHub Secrets
  # ==========================================================================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && needs.push.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context
          kubectl version --client

      - name: Deploy namespace and configs
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/configmap.yaml

      - name: Deploy database
        run: |
          kubectl apply -f k8s/mongodb-deployment.yaml
          kubectl apply -f k8s/mongodb-service.yaml
          echo "Waiting for MongoDB to be ready..."
          kubectl wait --namespace=ecomops \
            --for=condition=ready pod \
            --selector=app=mongodb \
            --timeout=120s

      - name: Deploy application services
        run: |
          kubectl apply -f k8s/product-deployment.yaml
          kubectl apply -f k8s/product-service.yaml
          kubectl apply -f k8s/cart-deployment.yaml
          kubectl apply -f k8s/cart-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          echo "Waiting for services to be ready..."
          kubectl wait --namespace=ecomops \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=backend,app.kubernetes.io/part-of=ecomops-platform \
            --timeout=180s

      - name: Deploy monitoring stack
        run: |
          kubectl apply -f monitoring/prometheus-deployment.yaml
          kubectl apply -f monitoring/prometheus-service.yaml
          kubectl apply -f monitoring/grafana-deployment.yaml
          kubectl apply -f monitoring/grafana-service.yaml
          echo "Waiting for monitoring to be ready..."
          kubectl wait --namespace=ecomops \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=monitoring \
            --timeout=120s

      - name: Verify deployment
        run: |
          echo "===== All Resources in ecomops namespace ====="
          kubectl get all -n ecomops
          echo ""
          echo "===== Pod Status ====="
          kubectl get pods -n ecomops -o wide
          echo ""
          echo "===== Service Endpoints ====="
          kubectl get svc -n ecomops
          echo ""
          echo "===== Deployment Status ====="
          kubectl get deployments -n ecomops

      - name: Rollout status check
        run: |
          kubectl rollout status deployment/product-service -n ecomops --timeout=120s
          kubectl rollout status deployment/cart-service -n ecomops --timeout=120s
          kubectl rollout status deployment/frontend -n ecomops --timeout=120s
