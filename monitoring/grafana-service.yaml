apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ecomops
  labels:
    app: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: ecomops-platform
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
      name: http
      protocol: TCP
  sessionAffinity: None
