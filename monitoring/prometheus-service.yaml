apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ecomops
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: ecomops-platform
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
      name: http
      protocol: TCP
  sessionAffinity: None
