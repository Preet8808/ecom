apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: ecomops
  labels:
    app.kubernetes.io/name: mongodb-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ecomops-platform
type: Opaque
data:
  # Base64 encoded values
  # username: admin -> YWRtaW4=
  # password: password123 -> cGFzc3dvcmQxMjM=
  MONGO_INITDB_ROOT_USERNAME: YWRtaW4=
  MONGO_INITDB_ROOT_PASSWORD: cGFzc3dvcmQxMjM=
  MONGO_USERNAME: YWRtaW4=
  MONGO_PASSWORD: cGFzc3dvcmQxMjM=
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ecomops
  labels:
    app.kubernetes.io/name: app-secrets
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: ecomops-platform
type: Opaque
data:
  # JWT_SECRET: myjwtsecretkey -> bXlqd3RzZWNyZXRrZXk=
  JWT_SECRET: bXlqd3RzZWNyZXRrZXk=
