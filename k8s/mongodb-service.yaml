apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: ecomops
  labels:
    app: mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ecomops-platform
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb
      protocol: TCP
  sessionAffinity: None
