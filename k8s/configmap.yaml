apiVersion: v1
kind: ConfigMap
metadata:
  name: ecomops-config
  namespace: ecomops
  labels:
    app.kubernetes.io/name: ecomops-config
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: ecomops-platform
data:
  # MongoDB Configuration
  MONGO_HOST: "mongodb.ecomops.svc.cluster.local"
  MONGO_PORT: "27017"
  MONGO_DB_NAME: "ecomops"
  MONGO_AUTH_DB: "admin"
  
  # Service URLs (internal DNS)
  PRODUCT_SERVICE_URL: "http://product-service.ecomops.svc.cluster.local:5000"
  CART_SERVICE_URL: "http://cart-service.ecomops.svc.cluster.local:5000"
  FRONTEND_SERVICE_URL: "http://frontend.ecomops.svc.cluster.local:5000"
  
  # Flask Configuration
  FLASK_ENV: "production"
  FLASK_DEBUG: "0"
  
  # Application Settings
  APP_PORT: "5000"
  LOG_LEVEL: "INFO"
  
  # Prometheus scraping path
  PROMETHEUS_MULTIPROC_DIR: "/tmp/prometheus"
