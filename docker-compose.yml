# =============================================================================
# EcomOps - Docker Compose
# Local development orchestration for all services
# =============================================================================

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # MongoDB Database
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0-jammy
    container_name: ecomops-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: ecomops
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecomops-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Product Catalog Service
  # ---------------------------------------------------------------------------
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: ecomops-product-service
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB_NAME: ecomops
      MONGO_AUTH_DB: admin
      MONGO_USERNAME: admin
      MONGO_PASSWORD: password123
      APP_PORT: 5000
      FLASK_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecomops-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Shopping Cart Service
  # ---------------------------------------------------------------------------
  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: ecomops-cart-service
    restart: unless-stopped
    ports:
      - "5002:5000"
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB_NAME: ecomops
      MONGO_AUTH_DB: admin
      MONGO_USERNAME: admin
      MONGO_PASSWORD: password123
      PRODUCT_SERVICE_URL: http://product-service:5000
      APP_PORT: 5000
      FLASK_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      - ecomops-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Frontend Service
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecomops-frontend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PRODUCT_SERVICE_URL: http://product-service:5000
      CART_SERVICE_URL: http://cart-service:5000
      APP_PORT: 5000
      FLASK_ENV: production
    depends_on:
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
    networks:
      - ecomops-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Prometheus (Monitoring)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ecomops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - ecomops-network
    depends_on:
      - product-service
      - cart-service
      - frontend

  # ---------------------------------------------------------------------------
  # Grafana (Visualization)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.0.0
    container_name: ecomops-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards/ecomops-dashboard.json:/var/lib/grafana/dashboards/ecomops-dashboard.json:ro
    networks:
      - ecomops-network
    depends_on:
      - prometheus

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mongodb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  ecomops-network:
    driver: bridge
