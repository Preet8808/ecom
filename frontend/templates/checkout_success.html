{% extends "base.html" %}

{% block extra_css %}
<style>
    .success-page { max-width: 600px; margin: 60px auto; text-align: center; }
    .success-icon { font-size: 80px; margin-bottom: 24px; }
    .success-page h1 { font-size: 32px; color: #1a237e; margin-bottom: 16px; }
    .success-page p { color: #666; font-size: 16px; margin-bottom: 30px; }
    .success-actions { display: flex; gap: 16px; justify-content: center; }
    .success-actions a { padding: 14px 32px; border-radius: 8px; font-weight: 600; font-size: 16px; }
    .success-actions a.primary { background: #1a237e; color: white; }
    .success-actions a.secondary { background: #e8eaf6; color: #1a237e; }
    .order-details { background: white; padding: 30px; border-radius: 10px; text-align: left; margin-top: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .order-details h3 { margin-bottom: 16px; color: #1a237e; }
    .order-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .order-row.total { font-weight: 700; color: #1a237e; font-size: 16px; border-top: 2px solid #e0e0e0; margin-top: 8px; padding-top: 12px; }
</style>
{% endblock %}

{% block content %}
<div class="success-page">
    <div class="success-icon">&#9989;</div>
    <h1>Order Confirmed!</h1>
    <p>Thank you for your purchase. Your order has been placed successfully and will be processed shortly.</p>
    
    <div class="order-details" id="order-details" style="display:none;">
        <h3>Order Summary</h3>
        <div id="order-content"></div>
    </div>
    
    <div class="success-actions">
        <a href="/products" class="primary">Continue Shopping</a>
        <a href="/" class="secondary">Back to Home</a>
    </div>
</div>

<script>
    // Parse order from URL
    const params = new URLSearchParams(window.location.search);
    const orderData = params.get('order');
    if (orderData) {
        try {
            const order = JSON.parse(orderData);
            document.getElementById('order-details').style.display = 'block';
            const container = document.getElementById('order-content');
            container.innerHTML = `
                <div class="order-row"><span>Order ID</span><span>#${order.cart_id?.slice(-8) || 'N/A'}</span></div>
                <div class="order-row"><span>Status</span><span style="color:#4caf50;text-transform:capitalize;">${order.status || 'Confirmed'}</span></div>
                <div class="order-row"><span>Items</span><span>${order.items?.length || 0} product(s)</span></div>
                <div class="order-row"><span>Subtotal</span><span>$${(order.subtotal || 0).toFixed(2)}</span></div>
                ${order.discount > 0 ? `<div class="order-row"><span>Discount</span><span style="color:#4caf50;">-$${order.discount.toFixed(2)}</span></div>` : ''}
                <div class="order-row"><span>Shipping</span><span>${order.shipping === 0 ? 'FREE' : '$' + order.shipping.toFixed(2)}</span></div>
                <div class="order-row"><span>Tax</span><span>$${(order.tax || 0).toFixed(2)}</span></div>
                <div class="order-row total"><span>Total</span><span>$${(order.total || 0).toFixed(2)}</span></div>
                <div class="order-row" style="margin-top:12px;"><span>Payment</span><span style="text-transform:capitalize;">${order.payment_method || 'Credit Card'}</span></div>
                <div class="order-row"><span>Shipping Method</span><span style="text-transform:capitalize;">${order.shipping_method || 'Standard'}</span></div>
            `;
        } catch(e) {}
    }
</script>
{% endblock %}
